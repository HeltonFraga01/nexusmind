# ============================================================================
# NexusMind — Swarm stack para nexusmind.digital (Traefik + Let's Encrypt)
# ============================================================================
# Pré-requisitos:
# - Traefik já rodando no Swarm, com entrypoint websecure e certresolver
#   letsencryptresolver, conectado à overlay externa network_public.
# - DNS de nexusmind.digital apontando para o nó/IP do Swarm.
#
# Deploy (IMPORTANTE: nome do stack = "nexusmind", pois os serviços usam
# DNS interno nexusmind_postgres / nexusmind_redis):
#   export $(grep -v '^#' .env.nexusmind | xargs)
#   docker stack deploy -c nexusmind/deploy/stack.swarm.nexusmind.digital.yml nexusmind
# ============================================================================

services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:18-alpine}"
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
      POSTGRES_USER: "${POSTGRES_USER:-nexusmind}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-nexusmind}"
      TZ: "${TZ:-America/Sao_Paulo}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexusmind-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusmind} -d ${POSTGRES_DB:-nexusmind}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 20
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  redis:
    image: "${REDIS_IMAGE:-redis:8-alpine}"
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
      REDISCLI_AUTH: "${REDIS_PASSWORD:-}"
    command:
      - sh
      - -ec
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --save 60 1 --appendonly yes --appendfsync everysec --requirepass "$REDIS_PASSWORD"
        else
          exec redis-server --save 60 1 --appendonly yes --appendfsync everysec
        fi
    volumes:
      - redis_data:/data
    networks:
      - nexusmind-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 20
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  nexusmind:
    image: "${NEXUSMIND_IMAGE:-heltonfraga/nexusmind:latest}"
    environment:
      AUTO_SETUP: "true"

      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_MODE: "${SERVER_MODE:-release}"
      RUN_MODE: "${RUN_MODE:-standard}"
      TZ: "${TZ:-America/Sao_Paulo}"

      DATABASE_HOST: nexusmind_postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: "${POSTGRES_USER:-nexusmind}"
      DATABASE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      DATABASE_DBNAME: "${POSTGRES_DB:-nexusmind}"
      DATABASE_SSLMODE: "${DATABASE_SSLMODE:-disable}"

      REDIS_HOST: nexusmind_redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-1024}"
      REDIS_MIN_IDLE_CONNS: "${REDIS_MIN_IDLE_CONNS:-10}"
      REDIS_ENABLE_TLS: "${REDIS_ENABLE_TLS:-false}"

      ADMIN_EMAIL: "${ADMIN_EMAIL:?ADMIN_EMAIL is required}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"

      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_EXPIRE_HOUR: "${JWT_EXPIRE_HOUR:-24}"
      TOTP_ENCRYPTION_KEY: "${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}"

      # Domínio público (Ciabra usa WEBHOOK_BASE_URL para callbacks de PIX)
      WEBHOOK_BASE_URL: "${WEBHOOK_BASE_URL:-https://nexusmind.digital}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://nexusmind.digital}"
    volumes:
      - nexusmind_data:/app/data
    networks:
      - nexusmind-internal
      - network_public
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 30
        window: 180s
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_NETWORK:-network_public}
        - traefik.http.routers.nexusmind.rule=Host(`nexusmind.digital`)
        - traefik.http.routers.nexusmind.entrypoints=websecure
        - traefik.http.routers.nexusmind.tls=true
        - traefik.http.routers.nexusmind.tls.certresolver=letsencryptresolver
        - traefik.http.services.nexusmind.loadbalancer.server.port=8080
        - traefik.http.services.nexusmind.loadbalancer.healthcheck.path=/health
        - traefik.http.services.nexusmind.loadbalancer.healthcheck.interval=30s
        - traefik.http.services.nexusmind.loadbalancer.healthcheck.timeout=10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nexusmind_data:
    driver: local

networks:
  nexusmind-internal:
    driver: overlay
    attachable: true
  network_public:
    external: true
    name: ${TRAEFIK_NETWORK:-network_public}
