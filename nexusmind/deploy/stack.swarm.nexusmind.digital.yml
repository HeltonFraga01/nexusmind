# ============================================================================
# NexusMind — Swarm stack para nexusmind.digital (Traefik + Let's Encrypt)
# ============================================================================
# Pré-requisitos:
# - Traefik já rodando no Swarm, com entrypoint websecure e certresolver
#   letsencryptresolver, conectado à overlay externa network_public.
# - DNS de nexusmind.digital apontando para o nó/IP do Swarm.
#
# Deploy (IMPORTANTE: nome do stack = "nexusmind", pois os serviços usam
# DNS interno nexusmind_postgres / nexusmind_redis):
#   export $(grep -v '^#' .env.nexusmind | xargs)
#   docker stack deploy -c nexusmind/deploy/stack.swarm.nexusmind.digital.yml nexusmind
#
# NOTA DE UPGRADE: postgres/redis usam order=stop-first e o app não tolera o
# banco fora na inicialização. Se um `stack deploy` mudar postgres E o app ao
# mesmo tempo, o app pode perder a corrida e cair (Swarm faz rollback). Em
# upgrades que tocam o postgres, rode o deploy 2x: a 1ª sobe o postgres novo,
# a 2ª reconcilia o app já com o banco no ar.
# ============================================================================

services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:18-alpine}"
    # nexusmind: max_connections=200 — o pool do app (max_open_conns) pode dobrar
    # durante deploy start-first; default 100 do Postgres causava "too many clients".
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-200}"
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
      POSTGRES_USER: "${POSTGRES_USER:-nexusmind}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-nexusmind}"
      TZ: "${TZ:-America/Sao_Paulo}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexusmind-internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusmind} -d ${POSTGRES_DB:-nexusmind}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      replicas: 1
      resources:
        # nexusmind: limite de CPU p/ proteger vizinhos no host Swarm compartilhado
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 256M
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 20
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  redis:
    image: "${REDIS_IMAGE:-redis:8-alpine}"
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
      REDISCLI_AUTH: "${REDIS_PASSWORD:-}"
    command:
      - sh
      - -ec
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --save 60 1 --appendonly yes --appendfsync everysec --requirepass "$REDIS_PASSWORD"
        else
          exec redis-server --save 60 1 --appendonly yes --appendfsync everysec
        fi
    volumes:
      - redis_data:/data
    networks:
      - nexusmind-internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 20
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  nexusmind:
    image: "${NEXUSMIND_IMAGE:?set NEXUSMIND_IMAGE}"
    environment:
      AUTO_SETUP: "true"

      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_MODE: "${SERVER_MODE:-release}"
      RUN_MODE: "${RUN_MODE:-standard}"
      TZ: "${TZ:-America/Sao_Paulo}"
      # nexusmind: confia no Traefik (overlay do Swarm) para ler X-Forwarded-For;
      # sem isso o rate-limit/ban de IP/auditoria veem todo tráfego como 1 IP só.
      SERVER_TRUSTED_PROXIES: "${SERVER_TRUSTED_PROXIES:-10.0.0.0/8}"

      DATABASE_HOST: nexusmind_postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: "${POSTGRES_USER:-nexusmind}"
      DATABASE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      DATABASE_DBNAME: "${POSTGRES_DB:-nexusmind}"
      DATABASE_SSLMODE: "${DATABASE_SSLMODE:-disable}"
      # nexusmind: pool limitado p/ caber em max_connections=200 mesmo com
      # 2 containers do app no overlap do deploy start-first (2x80=160 < 200).
      DATABASE_MAX_OPEN_CONNS: "${DATABASE_MAX_OPEN_CONNS:-80}"
      DATABASE_MAX_IDLE_CONNS: "${DATABASE_MAX_IDLE_CONNS:-20}"
      # nexusmind: reciclagem de conexões (recomendado pelo docker-compose oficial do sub2api)
      DATABASE_CONN_MAX_LIFETIME_MINUTES: "${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}"
      DATABASE_CONN_MAX_IDLE_TIME_MINUTES: "${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}"

      REDIS_HOST: nexusmind_redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-1024}"
      REDIS_MIN_IDLE_CONNS: "${REDIS_MIN_IDLE_CONNS:-10}"
      REDIS_ENABLE_TLS: "${REDIS_ENABLE_TLS:-false}"

      ADMIN_EMAIL: "${ADMIN_EMAIL:?ADMIN_EMAIL is required}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"

      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_EXPIRE_HOUR: "${JWT_EXPIRE_HOUR:-24}"
      TOTP_ENCRYPTION_KEY: "${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}"

      # Domínio público (Ciabra usa WEBHOOK_BASE_URL para callbacks de PIX)
      WEBHOOK_BASE_URL: "${WEBHOOK_BASE_URL:-https://nexusmind.digital}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://nexusmind.digital}" # nexusmind: viper mapeia cors.allowed_origins

      # nexusmind: hardening de SSRF — só HTTPS e bloqueia hosts de rede privada
      # nas URLs de upstream configuráveis pelo admin (provedores de IA são públicos).
      SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS: "${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}"
      SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP: "${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}"
    volumes:
      - nexusmind_data:/app/data
    networks:
      - nexusmind-internal
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 1
      resources:
        # nexusmind: teto 1G p/ folga sob carga; CPU limitada contra noisy-neighbor
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 30
        window: 180s
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_NETWORK:-network_public}
        - traefik.http.routers.nexusmind.rule=Host(`nexusmind.digital`)
        - traefik.http.routers.nexusmind.entrypoints=websecure
        - traefik.http.routers.nexusmind.tls=true
        - traefik.http.routers.nexusmind.tls.certresolver=letsencryptresolver
        - traefik.http.services.nexusmind.loadbalancer.server.port=8080
        - traefik.http.services.nexusmind.loadbalancer.healthcheck.path=/health
        - traefik.http.services.nexusmind.loadbalancer.healthcheck.interval=30s
        - traefik.http.services.nexusmind.loadbalancer.healthcheck.timeout=10s

  # nexusmind: backup automático do Postgres — pg_dump -Fc diário, retenção 14 dumps.
  # Usa a mesma imagem postgres:18-alpine (pg_dump compatível com o servidor 18).
  # Em falha (ex: banco reiniciando), tenta de novo em 5 min.
  pgbackup:
    image: "${POSTGRES_IMAGE:-postgres:18-alpine}"
    environment:
      PGHOST: nexusmind_postgres
      PGPORT: "5432"
      PGUSER: "${POSTGRES_USER:-nexusmind}"
      PGDATABASE: "${POSTGRES_DB:-nexusmind}"
      PGPASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      TZ: "${TZ:-America/Sao_Paulo}"
      KEEP: "${PGBACKUP_KEEP:-14}"
    command:
      - sh
      - -ec
      - |
        echo "[pgbackup] iniciado - retencao=$$KEEP dumps, intervalo 24h"
        while true; do
          TS=$$(date +%Y%m%d-%H%M%S)
          OUT="/backups/nexusmind-$$TS.dump"
          if pg_dump -Fc -f "$$OUT"; then
            echo "[pgbackup] OK $$OUT ($$(du -h "$$OUT" | cut -f1))"
            ls -1t /backups/nexusmind-*.dump 2>/dev/null | tail -n +$$(( KEEP + 1 )) | xargs -r rm -f
            sleep 86400
          else
            echo "[pgbackup] FALHOU $$TS - retry em 5min"
            rm -f "$$OUT"
            sleep 300
          fi
        done
    volumes:
      - pgbackup_data:/backups
    networks:
      - nexusmind-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 32M
      placement:
        constraints:
          - "node.hostname == ${SWARM_STATEFUL_NODE:?set SWARM_STATEFUL_NODE}"
      restart_policy:
        condition: on-failure
        delay: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nexusmind_data:
    driver: local
  pgbackup_data:
    driver: local

networks:
  nexusmind-internal:
    driver: overlay
    attachable: true
  network_public:
    external: true
    name: ${TRAEFIK_NETWORK:-network_public}
